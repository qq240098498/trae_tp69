<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快递代收点管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">📦 快递<span>代收点</span></div>
    <nav>
      <a href="/" class="active">🏠 入库扫描</a>
      <a href="/outbound.html">📤 出库核销</a>
      <a href="/overdue.html">⏰ 滞留件管理</a>
      <a href="/shelves.html">🗄️ 货架状态</a>
      <a href="/notifications.html">📱 通知记录</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>入库扫描</h1>
      <p>扫描或输入运单号，系统自动分配货架位并发送取件通知</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card today-in">
        <div class="stat-label">今日入库</div>
        <div class="stat-value" id="todayIn">0</div>
      </div>
      <div class="stat-card today-out">
        <div class="stat-label">今日出库</div>
        <div class="stat-value" id="todayOut">0</div>
      </div>
      <div class="stat-card in-stock">
        <div class="stat-label">在库件数</div>
        <div class="stat-value" id="inStock">0</div>
      </div>
      <div class="stat-card overdue">
        <div class="stat-label">逾期件数</div>
        <div class="stat-value" id="overdue">0</div>
      </div>
      <div class="stat-card abnormal">
        <div class="stat-label">异常件数</div>
        <div class="stat-value" id="abnormal">0</div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <h2>📦 快递入库</h2>
        <form id="scanInForm">
          <div class="form-group">
            <label for="trackingNumber">运单号 *</label>
            <input type="text" id="trackingNumber" name="trackingNumber" placeholder="扫描或输入运单号" required autofocus maxlength="50">
          </div>
          <div class="form-group">
            <label for="recipientPhone">收件人手机号 *</label>
            <input type="tel" id="recipientPhone" name="recipientPhone" placeholder="输入收件人手机号" required maxlength="20">
          </div>
          <div class="form-group">
            <label for="recipientName">收件人姓名（选填）</label>
            <input type="text" id="recipientName" name="recipientName" placeholder="输入收件人姓名" maxlength="50">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 12px;">
            📥 确认入库
          </button>
        </form>
      </div>

      <div class="card">
        <h2>📋 入库结果</h2>
        <div id="scanResult" style="min-height: 200px; display: flex; align-items: center; justify-content: center; color: #999;">
          <div style="text-align: center;">
            <div style="font-size: 48px; margin-bottom: 10px;">📦</div>
            <p>请在左侧填写快递信息</p>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🔍 快递查询</h2>
      <div class="search-box">
        <input type="text" id="searchKeyword" placeholder="输入运单号、手机号或姓名搜索">
        <button class="btn btn-primary" onclick="searchPackages()">搜索</button>
      </div>
      <div id="searchResults">
        <table>
          <thead>
            <tr>
              <th>运单号</th>
              <th>手机号</th>
              <th>姓名</th>
              <th>货架位</th>
              <th>状态</th>
              <th>入库时间</th>
            </tr>
          </thead>
          <tbody id="searchTableBody">
            <tr><td colspan="6" style="text-align: center; color: #999; padding: 20px;">输入关键词搜索快递</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    function loadStats() {
      fetch('/api/stats')
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            document.getElementById('todayIn').textContent = data.data.todayIn;
            document.getElementById('todayOut').textContent = data.data.todayOut;
            document.getElementById('inStock').textContent = data.data.inStock;
            document.getElementById('overdue').textContent = data.data.overdue;
            document.getElementById('abnormal').textContent = data.data.abnormal;
          }
        })
        .catch(err => console.error('加载统计数据失败:', err));
    }

    document.getElementById('scanInForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const trackingNumber = document.getElementById('trackingNumber').value.trim();
      const recipientPhone = document.getElementById('recipientPhone').value.trim();
      const recipientName = document.getElementById('recipientName').value.trim();

      if (!trackingNumber || !recipientPhone) {
        showResultError('请填写运单号和手机号');
        return;
      }

      if (trackingNumber.length > 50) {
        showResultError('运单号长度不能超过50个字符');
        return;
      }

      if (recipientPhone.length > 20) {
        showResultError('手机号长度不能超过20个字符');
        return;
      }

      if (recipientName && recipientName.length > 50) {
        showResultError('姓名长度不能超过50个字符');
        return;
      }

      fetch('/api/packages/scan-in', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trackingNumber, recipientPhone, recipientName })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          showResultSuccess(data.data);
          loadStats();
          document.getElementById('scanInForm').reset();
          document.getElementById('trackingNumber').focus();
        } else {
          showResultError(data.error || '入库失败');
        }
      })
      .catch(err => {
        showResultError('网络错误，请重试');
        console.error(err);
      });
    });

    function showResultSuccess(data) {
      const pkg = data.package;
      const resultDiv = document.getElementById('scanResult');
      resultDiv.innerHTML = `
        <div style="width: 100%;">
          <div class="alert alert-success">
            ✅ 入库成功！已发送取件通知（短信 + APP推送）
          </div>
          <div class="shelf-code-display">
            ${pkg.shelf_code}
          </div>
          <div class="result-item">
            <span class="result-label">运单号：</span>
            <span class="result-value">${pkg.tracking_number}</span>
          </div>
          <div class="result-item">
            <span class="result-label">手机号：</span>
            <span class="result-value">${pkg.recipient_phone}</span>
          </div>
          <div class="result-item">
            <span class="result-label">收件人：</span>
            <span class="result-value">${pkg.recipient_name || '-'}</span>
          </div>
          <div class="result-item">
            <span class="result-label">入库时间：</span>
            <span class="result-value">${formatTime(pkg.in_time)}</span>
          </div>
        </div>
      `;
      resultDiv.className = '';
    }

    function showResultError(message) {
      const resultDiv = document.getElementById('scanResult');
      resultDiv.innerHTML = `
        <div style="width: 100%;">
          <div class="alert alert-error">
            ❌ ${message}
          </div>
          <p style="text-align: center; margin-top: 20px; color: #999;">请检查信息后重新尝试</p>
        </div>
      `;
      resultDiv.className = 'error';
    }

    function searchPackages() {
      const keyword = document.getElementById('searchKeyword').value.trim();
      if (!keyword) {
        alert('请输入搜索关键词');
        return;
      }

      fetch(`/api/packages/search?keyword=${encodeURIComponent(keyword)}`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('searchTableBody');
          if (data.success && data.data.length > 0) {
            tbody.innerHTML = data.data.map(pkg => `
              <tr>
                <td>${pkg.tracking_number}</td>
                <td>${pkg.recipient_phone}</td>
                <td>${pkg.recipient_name || '-'}</td>
                <td>${pkg.shelf_code || '-'}</td>
                <td>${getStatusBadge(pkg.status)}</td>
                <td>${formatTime(pkg.in_time)}</td>
              </tr>
            `).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999; padding: 20px;">未找到相关快递</td></tr>';
          }
        })
        .catch(err => {
          console.error(err);
          alert('搜索失败');
        });
    }

    function getStatusBadge(status) {
      const statusMap = {
        'in_stock': { text: '在库', class: 'badge-in-stock' },
        'picked': { text: '已取件', class: 'badge-picked' },
        'overdue': { text: '逾期', class: 'badge-overdue' },
        'abnormal': { text: '异常', class: 'badge-abnormal' }
      };
      const s = statusMap[status] || { text: status, class: '' };
      return `<span class="badge ${s.class}">${s.text}</span>`;
    }

    function formatTime(timeStr) {
      if (!timeStr) return '-';
      const d = new Date(timeStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    document.getElementById('searchKeyword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchPackages();
      }
    });

    loadStats();
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
